<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GharKhata — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b10;
    --surface: #111318;
    --border: rgba(255,255,255,0.07);
    --accent: #f0b429;
    --accent2: #e05c2e;
    --text: #e8e9f0;
    --text-muted: #6b7280;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  /* Animated background */
  .bg-glow {
    position: fixed;
    pointer-events: none;
    z-index: 0;
  }
  .bg-glow-1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(240,180,41,0.08) 0%, transparent 70%);
    top: -200px; left: -100px;
    animation: drift 8s ease-in-out infinite alternate;
  }
  .bg-glow-2 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(224,92,46,0.06) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    animation: drift 10s ease-in-out infinite alternate-reverse;
  }
  @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px, 20px); } }

  .login-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 24px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 44px 40px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    animation: slideUp 0.4s cubic-bezier(.4,0,.2,1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-logo {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    margin-bottom: 28px;
    box-shadow: 0 8px 20px rgba(240,180,41,0.3);
  }

  .login-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 6px;
  }

  .login-sub {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 36px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 8px;
  }

  .form-control {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .form-control:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(240,180,41,0.12);
  }

  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    padding: 14px;
    color: #000;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 24px;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(240,180,41,0.4);
  }

  .alert-error {
    background: rgba(224,92,46,0.1);
    border: 1px solid rgba(224,92,46,0.3);
    color: #e05c2e;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 0.85rem;
    margin-bottom: 20px;
  }

  .login-footer {
    text-align: center;
    margin-top: 28px;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .login-footer span { color: var(--accent); }
</style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">₹</div>
      <div class="login-title">GharKhata</div>
      <div class="login-sub">Home Finance Tracker — Sign in to continue</div>

      {% if error %}
      <div class="alert-error">⚠️ {{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-control" type="text" name="username" placeholder="Enter username" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" placeholder="Enter password" required>
        </div>
        <button class="btn-login" type="submit">Sign In →</button>
      </form>

      <div class="login-footer">
        GharKhata &nbsp;·&nbsp; <span>Home Finance</span> &nbsp;·&nbsp; Chennai
      </div>
    </div>
  </div>
</body>
</html>
