{% extends "base.html" %}
{% block title %}Fixed Costs — GharKhata{% endblock %}
{% block page_title %}Fixed Costs{% endblock %}
{% block content %}
<div style="max-width:580px;">
  <div class="card fi">
    <div class="ct">🏠 Monthly Fixed Costs</div>
    <p style="font-size:.83rem;color:var(--muted);margin-bottom:20px;">EB is auto-updated from meter readings. Rent, Gas, WiFi enter manually.</p>
    <form method="POST">
      <div class="fg">
        <div class="fgp">
          <label>Rent (₹)</label>
          <input class="fc" type="number" step="0.01" name="rent" value="{{ fixed.rent if fixed else '' }}" placeholder="0.00" required>
        </div>
        <div class="fgp">
          <label>Gas (₹)</label>
          <input class="fc" type="number" step="0.01" name="gas" value="{{ fixed.gas if fixed else '' }}" placeholder="0.00" required>
        </div>
        <div class="fgp">
          <label>WiFi / Internet (₹)</label>
          <input class="fc" type="number" step="0.01" name="wifi" value="{{ fixed.wifi if fixed else '' }}" placeholder="0.00" required>
        </div>
        <div class="fgp">
          <label>Electricity — Auto (₹)</label>
          <input class="fc" type="text" value="{{ fixed.eb if fixed else 0 }}" readonly style="opacity:.5;cursor:not-allowed;">
        </div>
      </div>
      <div class="fa">
        <button class="btn bp" type="submit">💾 Save</button>
        <a href="/" class="btn bg">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
