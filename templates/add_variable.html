{% extends "base.html" %}
{% block title %}Daily Expenses — GharKhata{% endblock %}
{% block page_title %}Add Daily Expenses{% endblock %}
{% block content %}
<div style="max-width:680px;">
  <div class="card fi">
    <div class="ct">🛒 Daily Variable Expenses</div>
    <form method="POST">
      <div class="fg" style="grid-template-columns:1fr;margin-bottom:14px;">
        <div class="fgp">
          <label>Date</label>
          <input class="fc" type="date" name="entry_date" value="{{ today }}" required style="max-width:220px;">
        </div>
      </div>
      <div class="fg">
        <div class="fgp"><label>🧺 Provisions (₹)</label><input class="fc amt" type="number" step="0.01" name="provisions" value="0" placeholder="0.00"></div>
        <div class="fgp"><label>🥦 Vegetables (₹)</label><input class="fc amt" type="number" step="0.01" name="vegetables" value="0" placeholder="0.00"></div>
        <div class="fgp"><label>🍎 Fruits (₹)</label><input class="fc amt" type="number" step="0.01" name="fruits" value="0" placeholder="0.00"></div>
        <div class="fgp"><label>🥩 Meat & Eggs (₹)</label><input class="fc amt" type="number" step="0.01" name="meat_egg" value="0" placeholder="0.00"></div>
        <div class="fgp"><label>💧 Water (₹)</label><input class="fc amt" type="number" step="0.01" name="water" value="0" placeholder="0.00"></div>
        <div class="fgp"><label>🚌 Transport (₹)</label><input class="fc amt" type="number" step="0.01" name="transport" value="0" placeholder="0.00"></div>
        <div class="fgp"><label>📦 Others (₹)</label><input class="fc amt" type="number" step="0.01" name="others" value="0" placeholder="0.00"></div>
        <div class="fgp" style="justify-content:flex-end;">
          <div style="background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:10px 13px;width:100%;">
            <div style="font-size:.7rem;color:var(--muted);margin-bottom:3px;">LIVE TOTAL</div>
            <div id="lt" style="font-family:var(--fh);font-size:1.4rem;font-weight:800;color:var(--gold);">₹0.00</div>
          </div>
        </div>
      </div>
      <div class="fa">
        <button class="btn bp" type="submit">💾 Save Entry</button>
        <a href="/" class="btn bg">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function upd(){ let t=0; document.querySelectorAll('.amt').forEach(i=>t+=parseFloat(i.value)||0); document.getElementById('lt').textContent='₹'+t.toFixed(2); }
document.querySelectorAll('.amt').forEach(i=>i.addEventListener('input',upd));
</script>
{% endblock %}
